<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RPG Character Forge{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">⚔️ Character Forge</a>
    <nav>
      <a href="{{ url_for('index') }}">Forjar</a>
      <a href="{{ url_for('aleatorio') }}">🎲 Aleatório</a>
      <a href="{{ url_for('personagens') }}">Meus personagens</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
